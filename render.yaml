# Render Blueprint: https://render.com/docs/blueprint-spec
# Set secrets in the dashboard: Environment → Environment Variables
#   DISCORD_TOKEN, ALERT_CHANNEL_ID, MONITOR_GUILD_ID (required)
#   STATE_DB_PATH (recommended: persistent disk path e.g. /data/state.db)
#   MONITOR_CATEGORY_ID, TEST_GUILD_ID, BOT_OWNER_USER_ID (optional)

services:
  - type: worker
    name: discord-monitor-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
